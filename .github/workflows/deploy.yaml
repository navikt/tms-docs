name: 'Deploy'
on:
  push:
    branches:
      - 'main'
      - "dev-*"

permissions:
  contents: 'read'
  id-token: 'write'
  packages: 'write'

jobs:
  build:
    name: 'build'
    runs-on: 'ubuntu-latest'

    steps:
      - uses: 'actions/checkout@v3'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false # Recommended if using actions/setup-node for caching
      - uses: 'actions/setup-node@v3'
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: 'Install dependencies'
        run: 'pnpm install --config.minimum-release-age=10080 --frozen-lockfile'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: 'Build application'
        run: 'pnpm run build'

      - name: 'Build and push'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: min-side

    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deploy-dev:
    runs-on: 'ubuntu-latest'
    needs: 'build'
    steps:
      - uses: 'actions/checkout@v3'
      - name: 'Deploy'
        uses: 'nais/deploy/actions/deploy@v2'
        env:
          CLUSTER: 'dev-gcp'
          RESOURCE: nais/dev-gcp/nais.yaml
          VAR: image=${{ needs.build.outputs.image }},version=${{ github.sha }}

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: 'ubuntu-latest'
    needs: 'build'
    steps:
      - uses: 'actions/checkout@v3'
      - name: 'Deploy'
        uses: 'nais/deploy/actions/deploy@v2'
        env:
          CLUSTER: 'prod-gcp'
          RESOURCE: nais/prod-gcp/nais.yaml
          VAR: image=${{ needs.build.outputs.image }},version=${{ github.sha }}
